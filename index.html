<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Space 🤍</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Courier+Prime&family=Lora:ital@1&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            background-attachment: fixed;
            color: #fff;
            height: 100%;
            width: 100%;
            overflow-x: hidden; /* Fixes horizontal scroll issue */
            display: flex;
            flex-direction: column;
        }

        /* --- Login Screen --- */
        #loginScreen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .login-btn {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255,255,255,0.5);
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 30px; /* Rounded button */
            color: white;
            cursor: pointer;
            backdrop-filter: blur(10px);
            margin: 10px;
            font-weight: 500;
            transition: 0.2s;
            width: 250px;
        }

        .login-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.5);
        }

        .login-header h1 { font-size: 32px; font-weight: 600; text-align: center; margin-bottom: 10px; }
        .login-header p { text-align: center; margin-bottom: 30px; font-size: 16px; opacity: 0.9; }

        /* --- Navigation Bar --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            height: 70px;
            flex-shrink: 0;
        }

        .navbar-brand {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .nav-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.1);
            padding: 5px 15px 5px 5px;
            border-radius: 30px;
        }

        .nav-avatar-wrapper {
            position: relative;
            display: flex;
        }

        .nav-avatar {
            width: 35px;
            height: 35px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }

        .status-dot-small {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            position: absolute;
            bottom: 0px;
            right: 0px;
            border: 2px solid #b8a4df; /* Matches navbar tone */
            transition: all 0.3s;
        }

        .nav-name {
            font-size: 14px;
            font-weight: 500;
        }

        /* --- Main Content Area (Responsive Grid) --- */
        .main-container {
            display: grid;
            grid-template-columns: 1fr; 
            gap: 15px; /* Reduced gap for mobile */
            padding: 15px; /* Reduced padding for mobile */
            flex-grow: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            overflow-y: auto; /* Allows scrolling inside the container if needed */
        }

        @media (min-width: 800px) and (orientation: landscape) {
            .main-container {
                grid-template-columns: 1fr 1.5fr; 
                height: calc(100vh - 70px);
                padding: 30px;
                gap: 25px;
            }
        }

        /* --- Glass Cards --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius:505px; /* More circular */
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            padding: 20px; /* Reduced padding slightly to save mobile space */
            display: flex;
            flex-direction: column;
        }

        .section-title { 
            font-size: 16px; 
            font-weight: 600; 
            margin-bottom: 15px; 
            opacity: 0.9; 
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
            text-align: center;
        }

        /* --- Partner Status Card --- */
        .partner-card-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            padding-bottom: 15px;
        }

        .avatar-large { 
            width: 100px; /* Slightly smaller for mobile */
            height: 100px; 
            background: rgba(255, 255, 255, 0.2); 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 50px; 
            position: relative; 
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .status-dot-large { 
            width: 22px; 
            height: 22px; 
            border-radius: 50%; 
            position: absolute; 
            bottom: 5px; 
            right: 5px; 
            border: 4px solid #b8a4df; 
            transition: all 0.5s;
        }
        
        .dot-free { background-color: #00e676; box-shadow: 0 0 10px #00e676; }
        .dot-busy { background-color: #ff5252; box-shadow: 0 0 10px #ff5252; }
        
        .partner-card-content h3 { font-size: 22px; margin-bottom: 5px; }
        .status-text { font-size: 14px; background: rgba(0,0,0,0.2); padding: 6px 14px; border-radius: 20px; letter-spacing: 0.5px;}

        .my-status-toggle {
            width: 100%;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            padding: 14px;
            border-radius: 50px; /* Matched to card radius */
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            margin-top: auto;
        }

        .my-status-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* --- Canvas Card --- */
        .canvas-card {
            display: flex;
            flex-direction: column;
        }

        .toolbar { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 6px; /* Tighter gap for mobile */
            background: rgba(255, 255, 255, 0.2); 
            padding: 10px; 
            border-radius: 20px; 
            justify-content: center; 
            margin-bottom: 15px;
        }
        
        .toolbar button, .toolbar select, .toolbar input[type="color"] {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255,255,255,0.4);
            color: #333;
            border-radius: 8px;
            padding: 6px 10px; /* Smaller padding */
            font-size: 13px; /* Smaller font */
            cursor: pointer;
            outline: none;
            backdrop-filter: blur(5px);
            transition: 0.2s;
        }

        .toolbar button:hover, .toolbar select:hover { background: rgba(255, 255, 255, 0.5); }
        .toolbar button { font-weight: bold; }
        .toolbar input[type="color"] { 
            padding: 0; 
            width: 30px; 
            height: 30px; 
            border-radius: 50%; 
            overflow: hidden; 
            border: none; 
            cursor: pointer;
            background: transparent;
        }
        
        .toolbar input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        
        .toolbar input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 50%;
        }
        
        .toolbar input[type="color"]::-moz-color-swatch {
            border: none;
            border-radius: 50%;
        }        
        .editor-area {
            flex-grow: 1;
            min-height: 200px;
            background: rgba(255, 255, 255, 0.9); /* Whiter background */
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 20px;
            padding: 15px;
            color: #555; /* Dimmer text color */
            font-size: 15px;
            outline: none;
            overflow-y: auto;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .editor-area:empty:before {
            content: attr(data-placeholder);
            color: rgba(0,0,0,0.3);
            pointer-events: none;
            display: block;
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-header">
            <h1>Our Space 🤍</h1>
            <p>Who is logging in?</p>
        </div>
        <button class="login-btn" onclick="loginUser('siddharth')">🧑🏻 I am Siddharth</button>
        <button class="login-btn" onclick="loginUser('bhumikaa')">👩🏻 I am Bhumikaa</button>
    </div>

    <div id="mainApp" style="display: none; flex-grow: 1; flex-direction: column;">
        
        <nav class="navbar">
            <div class="navbar-brand">Our Space 🤍</div>
            <div class="nav-profile">
                <div class="nav-avatar-wrapper">
                    <div class="nav-avatar" id="navUserEmoji">🧑🏻</div>
                    <div class="status-dot-small dot-free" id="myNavDot"></div>
                </div>
                <div class="nav-name" id="navUserName">Loading...</div>
            </div>
        </nav>

        <div class="main-container">
            
            <div class="glass-card">
                <h2 class="section-title">Partner's Status</h2>
                
                <div class="partner-card-content">
                    <div class="avatar-large">
                        <span id="partnerEmoji">👩🏻</span>
                        <div class="status-dot-large dot-free" id="partnerDot"></div>
                    </div>
                    <h3 id="partnerName">Bhumikaa</h3>
                    <span class="status-text" id="partnerStatusText">Loading...</span>
                </div>

                <button class="my-status-toggle" id="myStatusBtn" onclick="toggleMyStatus()">
                    Update My Status
                </button>
            </div>

            <div class="glass-card canvas-card">
                <h2 class="section-title">Our Canvas 🎨</h2>
                
               <div class="toolbar">
                    <button onmousedown="event.preventDefault();" onclick="formatDoc('bold')" title="Bold">B</button>
                    <button onmousedown="event.preventDefault();" onclick="formatDoc('italic')" style="font-style: italic;" title="Italic">I</button>
                    <button onmousedown="event.preventDefault();" onclick="formatDoc('underline')" style="text-decoration: underline;" title="Underline">U</button>
                    
                    <select onchange="formatDoc('fontName', this.value)">
                        <option value="Poppins">Normal</option>
                        <option value="Caveat">Handwriting</option>
                        <option value="Courier Prime">Typewriter</option>
                        <option value="Lora">Elegant</option>
                    </select>

                    <select onchange="formatDoc('fontSize', this.value)">
                        <option value="3">Normal</option>
                        <option value="5">Large</option>
                        <option value="7">Huge</option>
                    </select>

                    <input type="color" oninput="formatDoc('foreColor', this.value)" title="Text Color" value="#555555">
                </div>

                <div class="editor-area" id="sharedNote" contenteditable="true" data-placeholder="Leave a sweet note here..."></div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB0IsG5o9GOw2fcVYPd_6BOSCW1_oR9bFo",
            authDomain: "our-space-bd056.firebaseapp.com",
            databaseURL: "https://our-space-bd056-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "our-space-bd056",
            storageBucket: "our-space-bd056.firebasestorage.app",
            messagingSenderId: "122516044315",
            appId: "1:122516044315:web:e5affdcde5d82261add6be"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- GLOBAL VARIABLES ---
        let currentUser = "";
        let partnerUser = "";
        let myCurrentStatus = true; 

        document.getElementById('mainApp').style.display = 'none';

        // --- LOGIN LOGIC ---
        window.loginUser = function(user) {
            currentUser = user;
            partnerUser = (user === 'siddharth') ? 'bhumikaa' : 'siddharth';
            
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';

            document.getElementById('navUserName').innerText = (currentUser === 'siddharth') ? 'Siddharth' : 'Bhumikaa';
            document.getElementById('navUserEmoji').innerText = (currentUser === 'siddharth') ? '🧑🏻' : '👩🏻';

            document.getElementById('partnerName').innerText = (partnerUser === 'siddharth') ? 'Siddharth' : 'Bhumikaa';
            document.getElementById('partnerEmoji').innerText = (partnerUser === 'siddharth') ? '🧑🏻' : '👩🏻';
            
            setupDatabaseListeners();
        }

        // --- DATABASE LOGIC ---
        function setupDatabaseListeners() {
            // 1. Listen to partner's status
            const partnerStatusRef = ref(db, `sharedData/status/${partnerUser}`);
            onValue(partnerStatusRef, (snapshot) => {
                const isPartnerFree = snapshot.val();
                if (isPartnerFree !== null) {
                    const dot = document.getElementById('partnerDot');
                    const text = document.getElementById('partnerStatusText');
                    
                    if (isPartnerFree) {
                        dot.className = 'status-dot-large dot-free';
                        text.textContent = 'Free to Talk';
                    } else {
                        dot.className = 'status-dot-large dot-busy';
                        text.textContent = 'Busy';
                    }
                }
            });

            // 2. Listen to your OWN status
            const myStatusRef = ref(db, `sharedData/status/${currentUser}`);
            onValue(myStatusRef, (snapshot) => {
                const status = snapshot.val();
                if (status !== null) {
                    myCurrentStatus = status;
                }
                const btn = document.getElementById('myStatusBtn');
                const myNavDot = document.getElementById('myNavDot');
                
                if (myCurrentStatus) {
                    btn.innerText = "Change My Status to Busy";
                    myNavDot.className = "status-dot-small dot-free";
                } else {
                    btn.innerText = "Change My Status to Free";
                    myNavDot.className = "status-dot-small dot-busy";
                }
            });

            // 3. Sync the text editor
            const noteRef = ref(db, 'sharedData/note');
            const editor = document.getElementById('sharedNote');
            
            onValue(noteRef, (snapshot) => {
                const data = snapshot.val();
                if (data !== null && editor.innerHTML !== data) {
                    editor.innerHTML = data;
                }
            });

            editor.addEventListener('input', () => {
                set(noteRef, editor.innerHTML);
            });
        }

        // --- TOGGLE STATUS FUNCTION ---
        window.toggleMyStatus = function() {
            if (!currentUser) return;
            const newStatus = !myCurrentStatus;
            set(ref(db, `sharedData/status/${currentUser}`), newStatus);
        }

        // --- FONT FIX LOGIC ---
        const editor = document.getElementById('sharedNote');
        let savedSelection = null;

        // 1. Save the exact text you highlight whenever you click or type
        function saveSelection() {
            if (window.getSelection) {
                const sel = window.getSelection();
                if (sel.getRangeAt && sel.rangeCount) {
                    savedSelection = sel.getRangeAt(0);
                }
            }
        }

        editor.addEventListener('keyup', saveSelection);
        editor.addEventListener('mouseup', saveSelection);
        editor.addEventListener('mouseleave', saveSelection);

        // 2. Restore that highlight right before applying a font or size
        function restoreSelection() {
            if (savedSelection) {
                if (window.getSelection) {
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(savedSelection);
                }
            }
        }

        window.formatDoc = function(command, value = null) {
            restoreSelection(); // Bring back the highlighted text
            
            document.execCommand(command, false, value);
            
            editor.focus();
            saveSelection(); // Save the new state
            editor.dispatchEvent(new Event('input')); // Tell Firebase to sync
        }
    </script>
</body>
</html>
