<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Space 🤍</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Courier+Prime&family=Lora:ital@1&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            padding: 20px;
            margin-bottom: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .header h1 { font-size: 28px; font-weight: 600; }
        .section-title { font-size: 16px; font-weight: 500; margin-bottom: 15px; opacity: 0.9; }

        /* Status Cards */
        .status-container { display: flex; gap: 15px; }
        .person-card { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 15px 10px; cursor: pointer; transition: transform 0.2s;}
        .person-card:active { transform: scale(0.95); }
        .avatar { width: 60px; height: 60px; background: rgba(255, 255, 255, 0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; position: relative; margin-bottom: 8px;}
        .status-dot { width: 14px; height: 14px; border-radius: 50%; position: absolute; bottom: 2px; right: 2px; border: 2px solid #a18cd1; transition: all 0.3s;}
        
        .dot-free { background-color: #00e676; box-shadow: 0 0 10px #00e676; }
        .dot-busy { background-color: #ff5252; box-shadow: 0 0 10px #ff5252; }
        
        .person-card h3 { font-size: 14px; }
        .status-text { font-size: 11px; opacity: 0.8; background: rgba(0,0,0,0.1); padding: 4px 8px; border-radius: 12px; margin-top: 5px; }

        /* Rich Text Editor */
        .editor-container { display: flex; flex-direction: column; gap: 10px; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 8px; background: rgba(255, 255, 255, 0.2); padding: 10px; border-radius: 15px; justify-content: center; }
        
        .toolbar button, .toolbar select, .toolbar input[type="color"] {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255,255,255,0.4);
            color: #333;
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            backdrop-filter: blur(5px);
        }

        .toolbar button:active { background: rgba(255, 255, 255, 0.5); }
        .toolbar button { font-weight: bold; }
        .toolbar input[type="color"] { padding: 0; width: 30px; height: 30px; border-radius: 50%; overflow: hidden; cursor: pointer; border: none; }
        .toolbar input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        .toolbar input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }

        .editor-area {
            min-height: 200px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 15px;
            padding: 15px;
            color: #333;
            font-size: 16px;
            outline: none;
            overflow-y: auto;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .editor-area:empty:before {
            content: attr(data-placeholder);
            color: rgba(0,0,0,0.4);
            pointer-events: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Our Space 🤍</h1>
        <p>Always making time for you.</p>
    </div>

    <div class="status-container glass-panel">
        <div class="person-card" id="bhumikaaCard">
            <div class="avatar">
                👩🏻
                <div class="status-dot dot-busy" id="herDot"></div>
            </div>
            <h3>Bhumikaa</h3>
            <span class="status-text" id="herStatus">Busy</span>
        </div>

        <div class="person-card" id="siddharthCard" onclick="toggleMyStatus()">
            <div class="avatar">
                🧑🏻
                <div class="status-dot dot-free" id="myDot"></div>
            </div>
            <h3>Siddharth</h3>
            <span class="status-text" id="myStatus">Free to Talk</span>
        </div>
    </div>

    <div class="glass-panel">
        <h2 class="section-title">Our Canvas 🎨</h2>
        <div class="editor-container">
            <div class="toolbar">
                <button onclick="formatDoc('bold')" title="Bold">B</button>
                <button onclick="formatDoc('italic')" style="font-style: italic;" title="Italic">I</button>
                <button onclick="formatDoc('underline')" style="text-decoration: underline;" title="Underline">U</button>
                
                <select onchange="formatDoc('fontName', this.value)">
                    <option value="Poppins">Normal</option>
                    <option value="Caveat">Handwriting</option>
                    <option value="Courier Prime">Typewriter</option>
                    <option value="Lora">Elegant</option>
                </select>

                <select onchange="formatDoc('fontSize', this.value)">
                    <option value="3">Normal</option>
                    <option value="5">Large</option>
                    <option value="7">Huge</option>
                </select>

                <input type="color" onchange="formatDoc('foreColor', this.value)" title="Text Color" value="#333333">
            </div>

            <div class="editor-area" id="sharedNote" contenteditable="true" data-placeholder="Leave a sweet note here..."></div>
        </div>
    </div>

    <script type="module">
        // 1. Import Firebase from CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // 2. Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB0IsG5o9GOw2fcVYPd_6BOSCW1_oR9bFo",
            authDomain: "our-space-bd056.firebaseapp.com",
            databaseURL: "https://our-space-bd056-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "our-space-bd056",
            storageBucket: "our-space-bd056.firebasestorage.app",
            messagingSenderId: "122516044315",
            appId: "1:122516044315:web:e5affdcde5d82261add6be",
            measurementId: "G-QX6VG2545K"
        };

        // 3. Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ==========================================
        // FEATURE 1: LIVE TEXT EDITOR SYNC
        // ==========================================
        const noteRef = ref(db, 'sharedData/note');
        const editor = document.getElementById('sharedNote');

        // Listen for changes from the database (When she types)
        onValue(noteRef, (snapshot) => {
            const data = snapshot.val();
            if (data !== null && editor.innerHTML !== data) {
                editor.innerHTML = data;
            }
        });

        // Send changes to the database (When you type)
        editor.addEventListener('input', () => {
            set(noteRef, editor.innerHTML);
        });

        // ==========================================
        // FEATURE 2: LIVE STATUS SYNC
        // ==========================================
        let isFree = true;
        const myStatusRef = ref(db, 'sharedData/siddharthStatus');
        
        // Make the toggle function globally available to the HTML button
        window.toggleMyStatus = function() {
            isFree = !isFree;
            set(myStatusRef, isFree); // Send to database
        }

        // Listen for YOUR status changes in the database
        onValue(myStatusRef, (snapshot) => {
            const status = snapshot.val();
            if (status !== null) {
                isFree = status;
                const myDot = document.getElementById('myDot');
                const myStatus = document.getElementById('myStatus');
                
                if (isFree) {
                    myDot.className = 'status-dot dot-free';
                    myStatus.textContent = 'Free to Talk';
                } else {
                    myDot.className = 'status-dot dot-busy';
                    myStatus.textContent = 'Busy';
                }
            }
        });

        // Make the text formatting tool globally available
        window.formatDoc = function(command, value = null) {
            document.execCommand(command, false, value);
            editor.focus();
            // Trigger the input event so Firebase catches the style change
            editor.dispatchEvent(new Event('input')); 
        }
    </script>
</body>
</html>
