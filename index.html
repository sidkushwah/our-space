<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Space 🤍</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Courier+Prime&family=Lora:ital@1&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        /* Login Screen Overlay */
        #loginScreen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .login-btn {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255,255,255,0.5);
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(10px);
            margin: 10px;
            font-weight: 500;
            transition: 0.2s;
        }

        .login-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.5);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            padding: 20px;
            margin-bottom: 20px;
        }

        .header { text-align: center; margin-bottom: 25px; margin-top: 10px; }
        .header h1 { font-size: 28px; font-weight: 600; }
        .section-title { font-size: 16px; font-weight: 500; margin-bottom: 15px; opacity: 0.9; }

        /* Status Cards */
        .status-container { display: flex; justify-content: center; }
        .person-card { display: flex; flex-direction: column; align-items: center; padding: 15px; }
        .avatar { width: 80px; height: 80px; background: rgba(255, 255, 255, 0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 40px; position: relative; margin-bottom: 10px;}
        .status-dot { width: 18px; height: 18px; border-radius: 50%; position: absolute; bottom: 2px; right: 2px; border: 3px solid #a18cd1; transition: all 0.3s;}
        
        .dot-free { background-color: #00e676; box-shadow: 0 0 10px #00e676; }
        .dot-busy { background-color: #ff5252; box-shadow: 0 0 10px #ff5252; }
        
        .person-card h3 { font-size: 18px; }
        .status-text { font-size: 13px; opacity: 0.9; background: rgba(0,0,0,0.2); padding: 5px 12px; border-radius: 12px; margin-top: 5px; }

        .my-status-toggle {
            display: block;
            width: 100%;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 10px;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Rich Text Editor */
        .editor-container { display: flex; flex-direction: column; gap: 10px; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 8px; background: rgba(255, 255, 255, 0.2); padding: 10px; border-radius: 15px; justify-content: center; }
        
        .toolbar button, .toolbar select, .toolbar input[type="color"] {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255,255,255,0.4);
            color: #333;
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            backdrop-filter: blur(5px);
        }

        .toolbar button { font-weight: bold; }
        .toolbar input[type="color"] { padding: 0; width: 30px; height: 30px; border-radius: 50%; overflow: hidden; cursor: pointer; border: none; }
        
        .editor-area {
            min-height: 200px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 15px;
            padding: 15px;
            color: #333;
            font-size: 16px;
            outline: none;
            overflow-y: auto;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .editor-area:empty:before {
            content: attr(data-placeholder);
            color: rgba(0,0,0,0.4);
            pointer-events: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <div class="header">
            <h1>Our Space 🤍</h1>
            <p style="margin-bottom: 20px;">Who is logging in?</p>
        </div>
        <button class="login-btn" onclick="loginUser('siddharth')">🧑🏻 I am Siddharth</button>
        <button class="login-btn" onclick="loginUser('bhumikaa')">👩🏻 I am Bhumikaa</button>
    </div>

    <!-- MAIN APP CONTENT (Hidden until login) -->
    <div id="mainApp" style="display: none;">
        <div class="header">
            <h1>Our Space 🤍</h1>
            <p>Always making time for you.</p>
        </div>

        <div class="glass-panel">
            <h2 class="section-title" id="partnerTitle">Partner's Status</h2>
            
            <div class="status-container">
                <!-- Partner Profile Card -->
                <div class="person-card" id="partnerCard">
                    <div class="avatar">
                        <span id="partnerEmoji">👩🏻</span>
                        <div class="status-dot dot-free" id="partnerDot"></div>
                    </div>
                    <h3 id="partnerName">Bhumikaa</h3>
                    <span class="status-text" id="partnerStatusText">Loading...</span>
                </div>
            </div>

            <!-- Button to change YOUR status -->
            <button class="my-status-toggle" id="myStatusBtn" onclick="toggleMyStatus()">
                Update My Status
            </button>
        </div>

        <div class="glass-panel">
            <h2 class="section-title">Our Canvas 🎨</h2>
            <div class="editor-container">
                <!-- Added onmousedown="event.preventDefault()" to prevent losing text highlight -->
                <div class="toolbar" onmousedown="event.preventDefault()">
                    <button onclick="formatDoc('bold')" title="Bold">B</button>
                    <button onclick="formatDoc('italic')" style="font-style: italic;" title="Italic">I</button>
                    <button onclick="formatDoc('underline')" style="text-decoration: underline;" title="Underline">U</button>
                    
                    <select onchange="formatDoc('fontName', this.value)">
                        <option value="Poppins">Normal</option>
                        <option value="Caveat">Handwriting</option>
                        <option value="Courier Prime">Typewriter</option>
                        <option value="Lora">Elegant</option>
                    </select>

                    <select onchange="formatDoc('fontSize', this.value)">
                        <option value="3">Normal</option>
                        <option value="5">Large</option>
                        <option value="7">Huge</option>
                    </select>

                    <input type="color" onchange="formatDoc('foreColor', this.value)" title="Text Color" value="#333333">
                </div>

                <div class="editor-area" id="sharedNote" contenteditable="true" data-placeholder="Leave a sweet note here..."></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB0IsG5o9GOw2fcVYPd_6BOSCW1_oR9bFo",
            authDomain: "our-space-bd056.firebaseapp.com",
            databaseURL: "https://our-space-bd056-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "our-space-bd056",
            storageBucket: "our-space-bd056.firebasestorage.app",
            messagingSenderId: "122516044315",
            appId: "1:122516044315:web:e5affdcde5d82261add6be"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- GLOBAL VARIABLES ---
        let currentUser = "";
        let partnerUser = "";
        let myCurrentStatus = true; // true = free, false = busy

        // --- LOGIN LOGIC ---
        window.loginUser = function(user) {
            currentUser = user;
            partnerUser = (user === 'siddharth') ? 'bhumikaa' : 'siddharth';
            
            // Hide login, show main app
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';

            // Setup the UI for the partner's profile
            document.getElementById('partnerName').innerText = (partnerUser === 'siddharth') ? 'Siddharth' : 'Bhumikaa';
            document.getElementById('partnerEmoji').innerText = (partnerUser === 'siddharth') ? '🧑🏻' : '👩🏻';
            
            // Start listening to the database
            setupDatabaseListeners();
        }

        // --- DATABASE LOGIC ---
        function setupDatabaseListeners() {
            // 1. Listen to partner's status to display on the card
            const partnerStatusRef = ref(db, `sharedData/status/${partnerUser}`);
            onValue(partnerStatusRef, (snapshot) => {
                const isPartnerFree = snapshot.val();
                if (isPartnerFree !== null) {
                    const dot = document.getElementById('partnerDot');
                    const text = document.getElementById('partnerStatusText');
                    
                    if (isPartnerFree) {
                        dot.className = 'status-dot dot-free';
                        text.textContent = 'Free to Talk';
                    } else {
                        dot.className = 'status-dot dot-busy';
                        text.textContent = 'Busy';
                    }
                }
            });

            // 2. Listen to your OWN status to update your toggle button text
            const myStatusRef = ref(db, `sharedData/status/${currentUser}`);
            onValue(myStatusRef, (snapshot) => {
                const status = snapshot.val();
                if (status !== null) {
                    myCurrentStatus = status;
                }
                const btn = document.getElementById('myStatusBtn');
                btn.innerText = myCurrentStatus ? "Change My Status to Busy" : "Change My Status to Free";
            });

            // 3. Sync the text editor
            const noteRef = ref(db, 'sharedData/note');
            const editor = document.getElementById('sharedNote');
            
            onValue(noteRef, (snapshot) => {
                const data = snapshot.val();
                if (data !== null && editor.innerHTML !== data) {
                    editor.innerHTML = data;
                }
            });

            editor.addEventListener('input', () => {
                set(noteRef, editor.innerHTML);
            });
        }

        // --- TOGGLE STATUS FUNCTION ---
        window.toggleMyStatus = function() {
            if (!currentUser) return;
            const newStatus = !myCurrentStatus;
            set(ref(db, `sharedData/status/${currentUser}`), newStatus);
        }

        // --- FONT FIX LOGIC ---
        const editor = document.getElementById('sharedNote');
        
        // Force the browser to use CSS styles instead of old HTML tags for fonts
        document.execCommand('styleWithCSS', false, true);

        window.formatDoc = function(command, value = null) {
            document.execCommand(command, false, value);
            editor.focus();
            editor.dispatchEvent(new Event('input')); 
        }
    </script>
</body>
</html>
